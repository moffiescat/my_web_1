# 本地开发环境配置 (Windows)
# 使用方式: mvn spring-boot:run -Dspring-boot.run.profiles=local

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/my_web_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: org.example.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: defaultSecretForDevelopmentOnly

mail:
  host: smtp.qq.com
  port: 587
  username: your-email@qq.com
  password: your-auth-code
  properties:
    mail:
      smtp:
        auth: false
        starttls:
          enable: false
