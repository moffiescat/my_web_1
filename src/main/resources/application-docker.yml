# Docker 环境配置 (本地 Docker Desktop 或 云服务器)
# 使用方式: docker-compose up 自动使用此配置

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/my_web_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:init.sql

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: org.example.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:defaultSecretForDevelopmentOnly123456789012}
  expiration: 86400000

server:
  port: 8080

logging:
  level:
    org.example: info
    org.springframework: warn
    org.springframework.security: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/my-web-app.log
    max-size: 10MB
    max-history: 7

security:
  allowed-paths:
    - /
    - /index.html
    - /api/auth/**
    - /api/profile
    - /api/visit/**
    - /login.html
    - /register.html
    - /script.js
    - /style.css
  csrf:
    enabled: false

app:
  name: my-web-app
  version: 1.0.0
  default-profile:
    name: 谢沁桐
    age: 20
    profession: 开发者
    email: 2902125312@qq.com
