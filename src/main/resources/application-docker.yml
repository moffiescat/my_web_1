# Docker 环境配置 (本地 Docker Desktop 或 云服务器)
# 使用方式: mvn spring-boot:run -Dspring-boot.run.profiles=docker
# 或服务器直接用 docker-compose 启动时会自动使用此配置

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/my_web_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: org.example.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:defaultSecretForDevelopmentOnly}

mail:
  host: ${MAIL_HOST:smtp.qq.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:your-email@qq.com}
  password: ${MAIL_PASSWORD:your-auth-code}
  properties:
    mail:
      smtp:
        auth: false
        starttls:
          enable: false
